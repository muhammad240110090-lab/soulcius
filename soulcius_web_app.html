      return icons[name] || null;
    }

    // Komponen Logo Resmi SOULCIUS mengacu pada visual berkas "ChatGPT Image Jun 5, 2026, 05_57_05 PM.png"
    function SoulciusLogo({ className = "w-10 h-10", showText = false }) {
      return (
        <div className="flex items-center space-x-3 transition-transform duration-300 hover:scale-[1.02]">

              d="M320 120 C 230 90, 160 140, 160 220 C 160 270, 200 300, 260 300 C 310 300, 320 270, 290 260 C 250 250, 210 230, 210 190 C 210 150, 260 140, 310 170 C 330 180, 340 160, 320 120 Z" 
              fill="#8DA382" 
            />
            {/* Bagian bawah S - Steel Blue */}
            <path 
              d="M180 380 C 270 410, 340 360, 340 280 C 340 230, 300 200, 240 200 C 190 200, 180 230, 210 240 C 250 250, 290 270, 290 310 C 290 350, 240 360, 190 330 C 170 320, 160 340, 180 380 Z" 
              fill="#3B5F8F"

            <circle cx="310" cy="230" r="28" fill="#3B5F8F" />
          </svg>
          {showText && (
            <div className="flex flex-col select-none">
              <span className="text-2xl font-bold tracking-widest text-[#3B5F8F] font-sans">
                SOUL<span className="text-[#8DA382]">CIUS</span>
              </span>
              <span className="text-[10px] tracking-[0.2em] font-semibold text-slate-500 uppercase leading-none mt-0.5">

      );
    }

    // Mock Data Konseptual SOULCIUS
    const SOBAT_SEBAYA = [
      { id: 'sb-1', name: 'Rania Putri', major: 'Psikologi 2023', bio: 'Fokus pada penanganan kecemasan akademis dan validasi emosi awal.', avatar: '🌸', rating: 4.9, casesSolved: 24 },
      { id: 'sb-2', name: 'Dimas Aditya', major: 'Sosiologi 2022', bio: 'Siap mendengar keluh kesahmu tanpa menghakimi. Ruang aman dijamin 100%.', avatar: '🦊', rating: 4.8, casesSolved: 19 },
      { id: 'sb-3', name: 'Alisha Zahra', major: 'Ilmu Komunikasi 2023', bio: 'Pendengar aktif yang percaya bahwa setiap suara korban berharga untuk didengar.', avatar: '🐹', rating: 5.0, casesSolved: 31 },
    ];

    const ARTICLES = [
      { id: 'art-1', title: 'Mengenali Perbedaan Sedih Biasa vs Depresi Ringan', category: 'Mental Health Literacy', readTime: '3 Menit', likes: 124 },
      { id: 'art-2', title: 'Bagaimana Menolak Victim Blaming di Sekitarmu', category: 'Campaign & Advocacy', readTime: '5 Menit', likes: 215 },
      { id: 'art-3', title: '5 Coping Strategy Sederhana saat Panic Attack Melanda', category: 'Coping Strategy', readTime: '4 Menit', likes: 189 },
    ];

    const CASE_SIMULATIONS = [
      {
        id: 'sim-1',
        situation: 'Teman sekamarmu tiba-tiba sering mengurung diri dan menangis setelah pulang dari kegiatan organisasi, namun dia berkata "Aku gapapa, cuma capek". Apa respon empati terbaikmu?',
        options: [
          { text: '"Ah kamu lebay kali, semua orang juga capek berorganisasi."', points: 0, feedback: 'Ini adalah bentuk minimisasi perasaan korban yang mengarah ke pengabaian emosional.' },
          { text: '"Ya udah kalau ga mau cerita, tapi jangan bikin suasana kamar jadi suram ya."', points: 10, feedback: 'Respon ini egois dan berpotensi membuat temanmu semakin menutup diri.' },
          { text: '"Aku perhatikan belakangan ini kamu tampak lelah. Kalau kamu butuh teman cerita atau sekadar ditemani diam, aku ada di sini ya."', points: 30, feedback: 'Sangat luar biasa! Anda memvalidasi perubahan perilakunya tanpa memaksa, memberikan ruang aman tanpa tekanan.' }
        ]
      }
    ];

    function App() {
      const [activeTab, setActiveTab] = useState('home');
      const [assessmentAnswers, setAssessmentAnswers] = useState({});
      const [assessmentRisk, setAssessmentRisk] = useState(null);
      const [simScore, setSimScore] = useState(null);
      const [selectedSimOption, setSelectedSimOption] = useState(null);
      const [chatMessages, setChatMessages] = useState([
        { sender: 'system', text: 'Selamat datang di Ruang Aman SOBOT! Saya adalah asisten AI pendampingmu. Ceritakan apa yang sedang kamu rasakan tanpa takut dihakimi.' }
      ]);
      const [inputValue, setInputValue] = useState('');
      const [peerChatMessages, setPeerChatMessages] = useState([
        { sender: 'peer', text: 'Halo! Aku Sobat Sebaya-mu hari ini. Silakan ceritakan apa saja, identitasmu aman di sini.' }
      ]);
      const [peerInput, setPeerInput] = useState('');
      const [selectedPeer, setSelectedPeer] = useState(null);
      const [isAnonymous, setIsAnonymous] = useState(true);
      const [isChattingWithPeer, setIsChattingWithPeer] = useState(false);
      const [bookingDate, setBookingDate] = useState('');
      const [bookingTime, setBookingTime] = useState('');
      const [isBooked, setIsBooked] = useState(false);
      const [communityPosts, setCommunityPosts] = useState([
        { id: 'post-1', author: 'Anonim - Angkatan 22', content: 'Terima kasih SOULCIUS, akhirnya aku berani cerita setelah setahun memendam rasa cemas akibat dipojokkan rekan kerja organisasi.', likes: 42, time: '2 jam yang lalu' },
        { id: 'post-2', author: 'Anonim - Angkatan 23', content: 'Rasanya lega sekali saat Sobat Sebaya memvalidasi perasaanku dan tidak bilang kalau aku "baperan". Kalian hebat!', likes: 56, time: '5 jam yang lalu' }
      ]);
      const [newPostText, setNewPostText] = useState('');
      const [dailyMood, setDailyMood] = useState(null);
      const [assessmentFinished, setAssessmentFinished] = useState(false);

      // Kustom State untuk Notifikasi Pengganti Alert bawaan peramban
      const [customNotification, setCustomNotification] = useState(null);

      const triggerNotification = (type, title, message) => {
        setCustomNotification({ type, title, message });
      };

      const handleSendSobot = () => {
        if (!inputValue.trim()) return;
        const userMsg = { sender: 'user', text: inputValue };
        setChatMessages(prev => [...prev, userMsg]);
        const currentInput = inputValue;
        setInputValue('');

        setTimeout(() => {
          let botReply = '';
          const text = currentInput.toLowerCase();
          if (text.includes('sedih') || text.includes('cemas') || text.includes('takut')) {
            botReply = 'Perasaan sedih dan cemas yang kamu alami sangat valid. Kamu tidak sendirian. Apakah kamu bersedia mencoba mengisi menu "Layanan DETECT" di atas untuk mengetahui tingkat risikomu saat ini?';
          } else if (text.includes('victim blaming') || text.includes('salah')) {
            botReply = 'Ingat ya, kekerasan psikis yang terjadi bukanlah kesalahanmu. Perilaku menyalahkan korban (victim blaming) adalah salah satu fokus edukasi kami agar lingkungan kampus lebih aman.';
          } else {
            botReply = 'Terima kasih sudah berbagi denganku. Di SOULCIUS, kami berkomitmen menjaga kerahasiaanmu. Jika kamu membutuhkan telinga manusia yang responsif, kamu bisa bergeser ke menu "Ruang SUPPORT" untuk mengobrol dengan Sobat Sebaya.';
          }
          setChatMessages(prev => [...prev, { sender: 'bot', text: botReply }]);
        }, 900);
      };

      const handleSendPeer = () => {
        if (!peerInput.trim()) return;
        const userMsg = { sender: 'user', text: peerInput };
        setPeerChatMessages(prev => [...prev, userMsg]);
        setPeerInput('');

        setTimeout(() => {
          setPeerChatMessages(prev => [...prev, { 
            sender: 'peer', 
            text: 'Terima kasih sudah mau berbagi denganku. Ceritamu sepenuhnya aman. Aku mendengarkanmu dengan penuh empati. Kita bisa diskusikan bersama langkah nyaman selanjutnya, ya.' 
          }]);
        }, 1100);
      };

      const handleAssessmentAnswer = (questionId, score) => {
        setAssessmentAnswers(prev => ({ ...prev, [questionId]: score }));
      };

      const calculateRisk = () => {
        const totalQuestions = 5;
        const answeredCount = Object.keys(assessmentAnswers).length;
        if (answeredCount < totalQuestions) {
          triggerNotification(
            'warning', 
            'Asesmen Belum Lengkap', 
            'Mohon selesaikan kelima pertanyaan asesmen terlebih dahulu agar kami dapat mendeteksi tingkat risiko Anda dengan akurat.'
          );
          return;
        }

        const totalScore = Object.values(assessmentAnswers).reduce((a, b) => a + b, 0);
        let risk = 'Rendah';
        if (totalScore >= 11) risk = 'Tinggi';
        else if (totalScore >= 6) risk = 'Sedang';

        setAssessmentRisk(risk);
        setAssessmentFinished(true);
        triggerNotification(
          'success',
          'Asesmen Berhasil',
          `Identifikasi selesai. Kondisi psikis Anda tergolong dalam tingkat risiko: ${risk.toUpperCase()}. Silakan periksa rekomendasi pendampingan di sisi kanan.`
        );
      };

      const resetAssessment = () => {
        setAssessmentAnswers({});
        setAssessmentRisk(null);
        setAssessmentFinished(false);
      };

      const handleAddPost = () => {
        if (!newPostText.trim()) return;
        const newPost = {
          id: `post-${Date.now()}`,
          author: 'Anonim - Angkatan Baru',
          content: newPostText,
          likes: 0,
          time: 'Baru saja'
        };
        setCommunityPosts([newPost, ...communityPosts]);
        setNewPostText('');
        triggerNotification(
          'success',
          'Pesan Terkirim',
          'Terima kasih telah berbagi! Pesan anonim Anda berhasil diterbitkan ke komunitas setelah melewati sistem moderasi otomatis SOULCIUS.'
        );
      };

      const handleBooking = () => {
        if (!selectedPeer || !bookingDate || !bookingTime) {
          triggerNotification(
            'error',
            'Data Pertemuan Kurang',
            'Silakan tentukan Sobat Sebaya pilihan Anda serta lengkapi isian tanggal dan jam pertemuan.'
          );
          return;
        }
        setIsBooked(true);
        triggerNotification(
          'success',
          'Pertemuan Terjadwal',
          `Jadwal Anda bersama ${selectedPeer.name} telah berhasil terdaftar pada ${bookingDate} pukul ${bookingTime}. Detail dan lokasi ruang aman dikirimkan secara pribadi ke email Anda.`
        );
      };

      const handleTicketGeneration = () => {
        triggerNotification(
          'success',
          'Tiket Rujukan Dibuat',
          'Tiket Pengajuan Rujukan Anda berhasil dibuat dengan aman dan terenkripsi. Tim Satgas PPK atau Konselor Profesional UPT Universitas akan menghubungi Anda dalam waktu maksimal 1x24 jam.'
        );
      };

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 font-sans flex flex-col transition-colors duration-500">
          
          {/* NOTIFIKASI KUSTOM ELEGAN (Menghindari gangguan kaku bawaan alert) */}
          {customNotification && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm transition-opacity duration-300">
              <div className="bg-white rounded-3xl p-6 max-w-md w-full shadow-2xl border border-slate-100 transform scale-100 transition-transform duration-300 animate-fadeIn">
                <div className="flex items-start justify-between">
                  <div className="flex items-center space-x-3">
                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${
                      customNotification.type === 'success' ? 'bg-[#8DA382]/20 text-[#8DA382]' :
                      customNotification.type === 'warning' ? 'bg-amber-100 text-amber-700' :
                      'bg-rose-100 text-rose-600'
                    }`}>
                      {customNotification.type === 'success' ? <Icon name="check" className="w-5 h-5" /> : <Icon name="alert" className="w-5 h-5" />}
                    </div>
                    <h3 className="text-lg font-bold text-slate-800">{customNotification.title}</h3>
                  </div>
                  <button 
                    onClick={() => setCustomNotification(null)}
                    className="text-slate-400 hover:text-slate-600 p-1 rounded-full hover:bg-slate-50 transition-colors"
                  >
                    <Icon name="x" className="w-5 h-5" />
                  </button>
                </div>
                <p className="text-sm text-slate-600 mt-4 leading-relaxed">{customNotification.message}</p>
                <div className="mt-6 flex justify-end">
                  <button 
                    onClick={() => setCustomNotification(null)}
                    className="px-5 py-2.5 bg-[#3B5F8F] hover:bg-[#2D4A70] text-white font-semibold rounded-xl text-xs transition-all duration-200 shadow-sm active:scale-95"
                  >
                    Mengerti
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* HEADER BAR DENGAN LOGO SOULCIUS KUSTOM */}
          <header className="bg-white border-b border-slate-150 sticky top-0 z-40 shadow-sm transition-all duration-300">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
              <div className="cursor-pointer" onClick={() => setActiveTab('home')}>
                <SoulciusLogo className="w-12 h-12" showText={true} />
              </div>
              
              {/* Menu Navigasi dengan Penamaan yang Ramah/Humanis */}
              <nav className="hidden md:flex space-x-1">
                {[
                  { id: 'home', label: 'Dashboard' },
                  { id: 'aware', label: 'Pilar AWARE' },
                  { id: 'detect', label: 'Layanan DETECT' },
                  { id: 'support', label: 'Ruang SUPPORT' },
                  { id: 'protect', label: 'Jalur PROTECT' },
                  { id: 'recovery', label: 'Langkah RECOVERY' },
                ].map((tab) => (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    className={`px-4 py-2.5 rounded-xl text-xs font-semibold tracking-wide uppercase transition-all duration-300 transform active:scale-95 ${

                        <span className="text-xs text-slate-400 font-semibold">Diperbarui Berkala</span>
                      </div>
                      <p className="text-xs text-slate-500 leading-relaxed">
                        Bagaimana kondisi kebugaran batin dan emosi Anda saat ini? Isi jurnal kilat di bawah untuk memantau grafik pemulihan pribadi Anda.
                      </p>

                      <div className="grid grid-cols-5 gap-3 pt-2">
                        {[
                          { emoji: '😭', label: 'Terguncang', val: 1 },
                          { emoji: '😔', label: 'Cemas/Sedih', val: 2 },
                          { emoji: '😐', label: 'Biasa Saja', val: 3 },
                          { emoji: '🙂', label: 'Cukup Baik', val: 4 },
                          { emoji: '😊', label: 'Sangat Baik', val: 5 },
                        ].map((m) => (
                          <button 
                            key={m.val}
                            onClick={() => {
                              setDailyMood(m.val);
                              triggerNotification(
                                'success', 
                                'Mood Check-In Tercatat', 
                                'Terima kasih telah berbagi dengan diri Anda sendiri hari ini! Grafik pemulihan Anda menunjukkan stabilitas yang baik.'
                              );
                            }}
                            className={`p-3 rounded-2xl border transition-all duration-300 text-center flex flex-col items-center justify-center gap-1 transform active:scale-95 ${
                              dailyMood === m.val 
                                ? 'bg-teal-50 border-teal-500 text-teal-800 font-bold scale-[1.05] shadow-inner' 
                                : 'bg-slate-50 border-slate-200 text-slate-600 hover:bg-slate-100 hover:border-slate-300'
                            }`}
                          >
                            <span className="text-2xl">{m.emoji}</span>
                            <span className="text-[9px] block leading-none font-bold mt-1">{m.label}</span>
                          </button>
                        ))}
                      </div>
                    </div>

                    {/* Resource Center */}
                    <div className="space-y-4">
                      <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                        <Icon name="book" className="w-5 h-5 text-[#8DA382]" /> Perpustakaan Literasi Mandiri
                      </h3>

                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {[
                          { title: 'Jurnal Afirmasi Positif untuk Membangun Rasa Percaya Diri', type: 'Self Growth', downloads: 142 },
                          { title: 'Panduan Mengelola Post-Traumatic Stress Disorder (PTSD) Ringan', type: 'Clinical Mental Health', downloads: 98 },
                        ].map((item, idx) => (
                          <div key={idx} className="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm flex flex-col justify-between hover:shadow-md transition-all duration-300 transform hover:scale-[1.01]">
                            <div>
                              <span className="bg-slate-100 text-slate-600 text-[9px] font-bold uppercase px-2 py-0.5 rounded-full border border-slate-200">{item.type}</span>
                              <h4 className="font-bold text-slate-800 text-sm mt-2.5 leading-snug">{item.title}</h4>
                            </div>
                            <div className="mt-4 pt-4 border-t border-slate-50 flex items-center justify-between text-[11px] text-slate-500">
                              <span>📥 {item.downloads} diunduh</span>
                              <span 
                                onClick={() => triggerNotification('success', 'Buku Saku Diunduh', 'Unduhan buku saku dimulai. Selamat membaca!')}
                                className="text-[#3B5F8F] font-bold cursor-pointer hover:underline"
                              >
                                Unduh Buku Saku
                              </span>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>

                  </div>

                  {/* Right Column: Moderated Support Community (Anonymous Forum) */}
                  <div className="bg-white rounded-3xl p-6 border border-slate-100 shadow-sm flex flex-col h-[520px] justify-between">
                    <div>
                      <h3 className="font-bold text-slate-800 text-base flex items-center gap-2">
                        <Icon name="users" className="w-5 h-5 text-[#3B5F8F]" /> Komunitas Aman (Anonim)
                      </h3>
                      <p className="text-xs text-slate-400 mt-1">Dapatkan kekuatan dari kesaksian sesama. Seluruh kiriman diproses secara rahasia dan termoderasi ketat.</p>
                      
                      {/* Share Feed Area */}
                      <div className="mt-4 space-y-3 h-[300px] overflow-y-auto pr-1">
                        {communityPosts.map((post) => (
                          <div key={post.id} className="p-3.5 bg-slate-50 rounded-2xl border border-slate-100 text-[11px] transition-all duration-300">
                            <div className="flex items-center justify-between mb-2">
                              <span className="font-bold text-slate-700">{post.author}</span>
                              <span className="text-slate-400">{post.time}</span>
                            </div>
                            <p className="text-slate-600 leading-relaxed font-light">{post.content}</p>
                            <div className="mt-2.5 flex items-center gap-1 text-slate-400 hover:text-[#8DA382] cursor-pointer transition-colors">
                              <Icon name="thumbsUp" className="w-3.5 h-3.5" /> <span className="font-semibold">{post.likes}</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* Post Input Box */}
                    <div className="pt-4 border-t border-slate-100 text-xs">
                      <textarea 
                        value={newPostText}
                        onChange={(e) => setNewPostText(e.target.value)}
                        rows="2" 
                        placeholder="Tulis pesan penyemangat atau kesaksian anonim Anda..."
                        className="w-full border border-slate-200 rounded-xl p-3 focus:outline-none focus:border-teal-500 bg-slate-50 font-medium"
                      />
                      <button 
                        onClick={handleAddPost}
                        className="mt-2 w-full bg-[#3B5F8F] hover:bg-[#2F4D75] text-white font-bold py-3 rounded-xl transition-all transform active:scale-95 shadow-md"
                      >
                        Kirim ke Komunitas (Anonim)
                      </button>
                    </div>
                  </div>

                </div>
              </div>
            )}

          </main>

          {/* FOOTER */}
          <footer className="bg-white border-t border-slate-150 mt-12 py-10 text-center text-xs text-slate-400">
            <div className="max-w-7xl mx-auto px-4 space-y-3">
              <div className="flex justify-center items-center">
                <SoulciusLogo className="w-10 h-10 filter grayscale opacity-60" />
              </div>
              <p className="font-extrabold text-[#3B5F8F] uppercase tracking-widest mt-2">
                SOULCIUS — Kampanye Pengurangan Dampak Perilaku Menyalahkan Korban (Victim Blaming)
              </p>
              <p className="text-slate-400 font-medium">© 2026 SOULCIUS Project. Menjaga Kesejahteraan Mental & Keamanan Jiwa Akademika Universitas.</p>
            </div>
          </footer>
        </div>
      );
    }

    // Melakukan render aplikasi React 18 ke DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
